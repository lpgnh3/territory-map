<!DOCTYPE html>
<html>
<head>
  <title>LPG Territory Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }

    /* KEY FIX: removes subpixel seams */
    .leaflet-overlay-pane svg path {
      shape-rendering: crispEdges;
    }
  </style>
</head>

<body>
<div id="map"></div>

<script>

const map = L.map('map').setView([44.5, -93.5], 6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);

const layerGroup = L.layerGroup().addTo(map);

// ---------------- REPS ----------------
const reps = {
  "NE_IA_SOUTH_MN": { name:"Tristen Durant", email:"tldurant@lpgnh3.com", phone:"(763) 234-8661", photo:"./photos/Tristen.jpg" },
  "ND_NORTH_MN": { name:"Darin Adolphson", email:"djadolphsen@lpgnh3.com", phone:"(763) 234-7674", photo:"./photos/Darin.jpg" },
  "IL_IN_OH_MI": { name:"Matt Hall", email:"mwhall@lpgnh3.com", phone:"(309) 206-0533", photo:"./photos/Matt.jpg" },
  "WI_UP_MI": { name:"Chris Mikula", email:"cmmikula@lpgnh3.com", phone:"(920) 470-0717", photo:"./photos/Chris.jpg" },
  "SD_MT_ID_WY": { name:"Norm Steveson", email:"nrsteveson@lpgnh3.com", phone:"800-328-0314", photo:"./photos/Norm.jpg" }
};

// ---------------- STYLE (SEAM ELIMINATION) ----------------
function style(color) {
  return {
    color: color,        // IMPORTANT: match fill exactly
    weight: 0,           // no stroke
    opacity: 0,
    fillColor: color,
    fillOpacity: 0.7,
    smoothFactor: 0      // reduces rendering interpolation gaps
  };
}

// ---------------- POPUP ----------------
function makePopup(rep) {
  return `
    <div style="display:flex;gap:12px;width:300px;font-family:Arial;align-items:center;">
      <img src="${rep.photo}"
        style="width:120px;height:150px;object-fit:cover;border-radius:10px;" />
      <div>
        <div style="font-weight:bold;font-size:15px;margin-bottom:6px;">
          ${rep.name}
        </div>
        <div style="font-size:12.5px;line-height:1.5;">
          ${rep.email}<br>${rep.phone}
        </div>
      </div>
    </div>
  `;
}

// ---------------- TERRITORY ----------------
function makeLayer(features, color, key) {

  const baseStyle = style(color);

  const layer = L.geoJSON(features, {

    style: baseStyle,

    onEachFeature: function (feature, l) {

      l.on("mouseover", function () {
        l.setStyle({ fillOpacity: 0.85 });
      });

      l.on("mouseout", function () {
        l.setStyle({ fillOpacity: baseStyle.fillOpacity });
      });

      l.on("click", function () {
        const rep = reps[key];

        L.popup()
          .setLatLng(l.getBounds().getCenter())
          .setContent(makePopup(rep))
          .openOn(map);
      });

    }
  });

  layer.addTo(layerGroup);
}

// ---------------- LOAD DATA ----------------
Promise.all([
  fetch("./data/states.json").then(r => r.json()),
  fetch("./data/counties.json").then(r => r.json())
]).then(([statesData, counties]) => {

  const states = statesData.features;

  const getState = (name) =>
    states.find(s => s.properties.NAME === name);

  const mn = counties.features.filter(c => c.properties.STATE === "27");

  const boundaryNames = new Set([
    "Meeker","Hennepin","Ramsey","Washington",
    "Chippewa","Lac qui Parle","Anoka","Wright"
  ]);

  const boundaryLatitudes = mn
    .filter(c => boundaryNames.has(c.properties.NAME))
    .map(c => turf.centroid(c).geometry.coordinates[1]);

  const splitLat =
    boundaryLatitudes.reduce((a,b) => a + b, 0) / boundaryLatitudes.length;

  const mnNorth = [];
  const mnSouth = [];

  mn.forEach(c => {
    const lat = turf.centroid(c).geometry.coordinates[1];
    if (lat >= splitLat) mnNorth.push(c);
    else mnSouth.push(c);
  });

  const miLower = counties.features.filter(c =>
    c.properties.STATE === "26"
  );

  const miUP = miLower.filter(c =>
    ["Alger","Baraga","Chippewa","Delta","Dickinson","Gogebic",
     "Houghton","Iron","Keweenaw","Luce","Mackinac",
     "Marquette","Menominee","Ontonagon","Schoolcraft"]
    .includes(c.properties.NAME)
  );

  const miLowerOnly = miLower.filter(c => !miUP.includes(c));

  const sd = counties.features.filter(c =>
  c.properties.STATE === "46"
);

const sdNorthNames = new Set([
  "Harding","Perkins","Butte","Ziebach","Corson","Dewey",
  "Potter","Faulk","Edmunds","Walworth","Campbell",
  "McPherson","Brown","Spink","Clark","Codington",
  "Grant","Roberts","Marshall","Day","Hamlin","Deuel"
]);

const sdSouthNames = new Set([
  "Sully","Stanley","Haakon","Jones","Lyman","Hughes",
  "Hyde","Hand","Beadle","Kingsbury","Brookings","Moody",
  "Lake","Miner","Sanborn","Jerauld","Buffalo","Brule",
  "Aurora","Davison","Hanson","McCook","Minnehaha",
  "Turner","Lincoln","Union","Clay","Yankton","Hutchinson",
  "Douglas","Charles Mix","Gregory","Tripp","Todd",
  "Mellette","Jackson","Bennett", "Bon Homme"
]);

const sdNorth = sd.filter(c => sdNorthNames.has(c.properties.NAME));
const sdSouth = sd.filter(c => sdSouthNames.has(c.properties.NAME));


  // ---------------- TERRITORIES ----------------

  makeLayer([getState("Nebraska"), getState("Iowa"), ...mnSouth, ...sdSouth], "#4dabf7", "NE_IA_SOUTH_MN");

  makeLayer([getState("Illinois"), getState("Indiana"), getState("Ohio"), ...miLowerOnly], "#f59f00", "IL_IN_OH_MI");

  makeLayer([getState("Wisconsin"), ...miUP], "#845ef7", "WI_UP_MI");

  // ND + Northern MN + Northern SD
makeLayer(
  [getState("North Dakota"), ...mnNorth, ...sdNorth],
  "#51cf66",
  "ND_NORTH_MN"
);

// IA + Southern MN + NE + Southern SD
makeLayer(
  [getState("Nebraska"), getState("Iowa"), ...mnSouth, ...sdSouth],
  "#4dabf7",
  "NE_IA_SOUTH_MN"
);

// Remaining SD (if any) stays with west territory
const assignedSD = new Set([...sdNorthNames, ...sdSouthNames]);

const sdRemaining = sd.filter(c =>
  !assignedSD.has(c.properties.NAME)
);

makeLayer(
  [...sdRemaining, getState("Montana"), getState("Idaho"), getState("Wyoming"), getState("Washington"), getState("Oregon")],
  "#ff6b6b",
  "SD_MT_ID_WY"
);

}).catch(err => {
  console.error("LOAD ERROR:", err);
});

</script>

</body>
</html>
