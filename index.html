<!DOCTYPE html>
<html>
<head>
  <title>LPG Territory Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    #map { height: 100vh; width: 100%; }

    .leaflet-interactive {
      transition: fill-opacity 0.15s ease;
    }

    .leaflet-overlay-pane path {
      stroke: none !important;
    }

    .leaflet-container {
      background: #fff;
    }

    @font-face {
      font-family: 'AntonCustom';
      src: url('./data/anton.ttf') format('truetype');
    }

    /* UI */
    #infoPanel {
      position: fixed;
      top: 0;
      right: -420px;
      width: 380px;
      height: 100vh;
      background: white;
      z-index: 9999;
      box-shadow: -2px 0 20px rgba(0,0,0,0.15);
      transition: right 0.25s ease;
      padding: 20px;
      overflow-y: auto;
    }

    #infoPanel.open { right: 0; }

    #bottomDrawer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 28vh;
      max-height: 240px;
      background: white;
      z-index: 1200;
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      box-shadow: 0 -8px 25px rgba(0,0,0,0.2);
      padding: 12px 14px;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.25s ease;
    }

    #bottomDrawer.open { transform: translateY(0); }

    @media (max-width: 768px) {
      #infoPanel { display: none; }
    }
    @media (min-width: 769px) {
      #bottomDrawer { display: none; }
    }

    .ui-card {
      display: flex;
      gap: 16px;
      align-items: center;
      transition: transform 0.2s ease;
    }

    .ui-card:hover {
      transform: translateY(-2px);
    }

    .ui-img {
      width: 140px;
      height: 170px;
      object-fit: cover;
      border-radius: 12px;
    }

    .ui-name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .contact-btn {
      display: inline-flex;
      align-items: center;
      margin-top: 8px;
      padding: 10px 14px;
      border-radius: 12px;
      background: linear-gradient(135deg,#f8f9fa,#e9ecef);
      border: 1px solid #dee2e6;
      text-decoration: none;
      color: #212529;
      font-family: 'AntonCustom', sans-serif;
      font-weight: 700;
      font-size: 22px;
      text-transform: uppercase;
      transition: all 0.15s ease;
    }

    .contact-btn:hover {
      transform: translateY(-3px) scale(1.03);
    }
  </style>
</head>

<body>

<div id="map"></div>
<div id="infoPanel"></div>
<div id="bottomDrawer"><div id="drawerContent"></div></div>

<script>

const map = L.map('map', {
  preferCanvas: true
}).setView([39, -94], 5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  updateWhenZooming: false,
  keepBuffer: 2
}).addTo(map);

let activeTerritory = null;

const reps = {
  NE_IA_SOUTH_MN: { name:"Tristen Durant", email:"tldurant@lpgnh3.com", phone:"(763) 234-8661", photo:"./photos/Tristen.jpg" },
  ND_NORTH_MN: { name:"Darin Adolphson", email:"djadolphsen@lpgnh3.com", phone:"(763) 234-7674", photo:"./photos/Darin.jpg" },
  WI_UP_MI: { name:"Chris Mikula", email:"cmmikula@lpgnh3.com", phone:"(920) 470-0717", photo:"./photos/Chris.jpg" },
  SD_MT_ID_WY: { name:"Norm Steveson", email:"nrsteveson@lpgnh3.com", phone:"800-328-0314", photo:"./photos/Norm.jpg" },
  IN_HOUSE: { name:"LPG & NH3 Supply", email:"sales@lpgnh3.com", phone:"800-328-0314", photo:"./photos/LPG.png" }
};

function render(k){
  const r = reps[k];
  return `
    <div class="ui-card">
      <img src="${r.photo}" class="ui-img"/>
      <div>
        <div class="ui-name">${r.name}</div>
        <a class="contact-btn" href="mailto:${r.email}">Email</a>
        <a class="contact-btn" href="tel:${r.phone.replace(/[^0-9+]/g,'')}">Call</a>
      </div>
    </div>`;
}

function openUI(k){
  const html = render(k);
  if (window.innerWidth <= 768) {
    document.getElementById("drawerContent").innerHTML = html;
    document.getElementById("bottomDrawer").classList.add("open");
  } else {
    document.getElementById("infoPanel").innerHTML = html;
    document.getElementById("infoPanel").classList.add("open");
  }
  activeTerritory = k;
}

map.on("click", () => {
  document.getElementById("infoPanel").classList.remove("open");
  document.getElementById("bottomDrawer").classList.remove("open");
});

function style(c){
  return { color:c, weight:0, fillColor:c, fillOpacity:0.7 };
}

function addLayer(feature,color,key){
  if(!feature) return;

  L.geoJSON(feature,{
    style: style(color),
    onEachFeature:(f,l)=>{

      l.on("click", e=>{
        L.DomEvent.stopPropagation(e);
        openUI(key);
      });

      l.on("mouseover", ()=>{
        l.setStyle({ fillOpacity: 0.9 });
      });

      l.on("mouseout", ()=>{
        l.setStyle({ fillOpacity: 0.7 });
      });

    }
  }).addTo(map);
}

// --- Turf helpers (unchanged) ---
function splitHorizontal(f,lat){
  const b=turf.bbox(f);
  return {
    north:turf.intersect(f,turf.bboxPolygon([b[0],lat,b[2],b[3]])),
    south:turf.intersect(f,turf.bboxPolygon([b[0],b[1],b[2],lat]))
  };
}

function splitVertical(f,lng){
  const b=turf.bbox(f);
  return {
    west:turf.intersect(f,turf.bboxPolygon([b[0],b[1],lng,b[3]])),
    east:turf.intersect(f,turf.bboxPolygon([lng,b[1],b[2],b[3]]))
  };
}

fetch("./data/states.json")
.then(r=>r.json())
.then(data=>{

  const states=data.features;
  const get=n=>states.find(s=>s.properties.NAME===n);

  const MN=get("Minnesota");
  const SD=get("South Dakota");

  const mn=splitHorizontal(MN,45.041907);
  const sdTop=splitHorizontal(SD,44.756391);
  const sdBot=splitVertical(sdTop.south,-102.239981);

  addLayer(mn.north,"#51cf66","ND_NORTH_MN");
  addLayer(mn.south,"#4dabf7","NE_IA_SOUTH_MN");

  addLayer(sdTop.north,"#51cf66","ND_NORTH_MN");
  addLayer(sdBot.east,"#4dabf7","NE_IA_SOUTH_MN");
  addLayer(sdBot.west,"#ff6b6b","SD_MT_ID_WY");

  ["Montana","Idaho","Wyoming","Washington","Oregon"].forEach(s=>
    addLayer(get(s),"#ff6b6b","SD_MT_ID_WY")
  );

  ["Illinois","Indiana","Ohio"].forEach(s=>
    addLayer(get(s),"#adb5bd","IN_HOUSE")
  );

  addLayer(get("Wisconsin"),"#845ef7","WI_UP_MI");

  const assigned=new Set([
    "Minnesota","South Dakota","North Dakota","Nebraska","Iowa",
    "Montana","Idaho","Wyoming","Washington","Oregon",
    "Illinois","Indiana","Ohio","Wisconsin","Michigan"
  ]);

  states.forEach(s=>{
    if(!assigned.has(s.properties.NAME)){
      addLayer(s,"#adb5bd","IN_HOUSE");
    }
  });

  L.geoJSON(states,{style:{color:"#2b2b2b",weight:1,fillOpacity:0},interactive:false}).addTo(map);

});

</script>
</body>
</html>
