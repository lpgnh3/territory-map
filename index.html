<!DOCTYPE html>
<html>
<head>
  <title>LPG Territory Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    #map { height: 100vh; width: 100%; }

    .leaflet-overlay-pane svg {
      shape-rendering: geometricPrecision;
    }

    .leaflet-overlay-pane path {
      stroke: none !important;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .leaflet-pane svg {
      transform: translateZ(0);
    }

    .popup-card {
      display: flex;
      gap: 12px;
      width: 300px;
      font-family: Arial;
      align-items: center;
    }

    .popup-img {
      width: 120px;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }

    .popup-name {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .popup-contact {
      font-size: 12.5px;
      line-height: 1.5;
    }


    #infoPanel {
      position: fixed;
      top: 0;
      right: -420px;
      width: 380px;
      height: 100vh;
      background: white;
      z-index: 9999;
      box-shadow: -2px 0 20px rgba(0,0,0,0.15);
      transition: right 0.25s ease;
      padding: 20px;
      font-family: Arial;
      overflow-y: auto;
    }

    #infoPanel.open { right: 0; }

    /* =========================
       MOBILE DRAWER
    ========================= */
    #bottomDrawer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: -60%;
      height: 28vh;
      max-height: 240px;

      background: white;
      z-index: 1200;

      border-top-left-radius: 18px;
      border-top-right-radius: 18px;

      box-shadow: 0 -8px 25px rgba(0,0,0,0.2);

      padding: 12px 14px;
      overflow-y: auto;

      transition: bottom 0.25s ease, transform 0.2s ease;
      font-family: Arial;
    }

    #bottomDrawer.open { bottom: 0; }

    .drawer-handle {
      width: 40px;
      height: 5px;
      background: #ccc;
      border-radius: 10px;
      margin: 6px auto 10px auto;
    }

    .drawer-card {
  display: flex;
  flex-direction: row-reverse; /* 👈 puts image on RIGHT, text on LEFT */
  gap: 12px;
  align-items: center;
}

.drawer-img {
  width: 90px;
  height: 90px;
  object-fit: cover;
  border-radius: 12px;
}

.drawer-text {
  flex: 1;
}

    @media (max-width: 768px) {
      #infoPanel { display: none; }
    }

    @media (min-width: 769px) {
      #bottomDrawer { display: none; }
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="infoPanel"></div>

<div id="bottomDrawer">
  <div class="drawer-handle"></div>
  <div id="drawerContent"></div>
</div>

<script>

const map = L.map('map', {
  preferCanvas: true
}).setView([39, -94], 5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  updateWhenZooming: false,
  keepBuffer: 2
}).addTo(map);

map.on("click", closeUI);

let activeRep = null;

// ---------------- REPS ----------------
const reps = {
  NE_IA_SOUTH_MN: { name:"Tristen Durant", email:"tldurant@lpgnh3.com", phone:"(763) 234-8661", photo:"./photos/Tristen.jpg" },
  ND_NORTH_MN: { name:"Darin Adolphson", email:"djadolphsen@lpgnh3.com", phone:"(763) 234-7674", photo:"./photos/Darin.jpg" },
  IL_IN_OH_MI: { name:"Matt Hall", email:"mwhall@lpgnh3.com", phone:"(309) 206-0533", photo:"./photos/Matt.jpg" },
  WI_UP_MI: { name:"Chris Mikula", email:"cmmikula@lpgnh3.com", phone:"(920) 470-0717", photo:"./photos/Chris.jpg" },
  SD_MT_ID_WY: { name:"Norm Steveson", email:"nrsteveson@lpgnh3.com", phone:"800-328-0314", photo:"./photos/Norm.jpg" },
  IN_HOUSE: { name:"LPG & NH3 Supply", email:"sales@lpgnh3.com", phone:"800-328-0314", photo:"./photos/LPG.png" }
};

// ---------------- UI ----------------
function render(repKey) {
  const r = reps[repKey];

  return `
    <div class="drawer-card">
      <img src="${r.photo}" class="drawer-img"/>

      <div class="drawer-text">
        <div class="popup-name">${r.name}</div>
        <div class="popup-contact">
          ${r.email}<br>
          ${r.phone}
        </div>
      </div>
    </div>
  `;
}

function openUI(repKey) {
  const isMobile = window.innerWidth <= 768;

  const panel = document.getElementById("infoPanel");
  const drawer = document.getElementById("bottomDrawer");

  const content = isMobile
    ? document.getElementById("drawerContent")
    : panel;

  // 🔁 TOGGLE behavior (click same territory closes it)
  if (activeRep === repKey) {
    closeUI();
    return;
  }

  activeRep = repKey;

  content.innerHTML = render(repKey);

  if (isMobile) {
    drawer.classList.add("open");
  } else {
    panel.classList.add("open");
  }
}

function closeUI() {
  activeRep = null;

  document.getElementById("infoPanel").classList.remove("open");
  document.getElementById("bottomDrawer").classList.remove("open");
}

// ---------------- DRAWER CONTROLS (FIXED) ----------------
const drawer = document.getElementById("bottomDrawer");
const handle = document.querySelector(".drawer-handle");

handle.addEventListener("click", (e) => {
  e.stopPropagation();
  drawer.classList.remove("open");
});

drawer.addEventListener("click", (e) => {
  if (e.target === drawer) drawer.classList.remove("open");
});

// swipe down to close
let startY = 0;
let currentY = 0;
let isDragging = false;

drawer.addEventListener("touchstart", (e) => {
  startY = e.touches[0].clientY;
  isDragging = true;
});

drawer.addEventListener("touchmove", (e) => {
  if (!isDragging) return;

  currentY = e.touches[0].clientY;
  const diff = currentY - startY;

  if (diff > 0) {
    drawer.style.transform = `translateY(${diff}px)`;
  }
});

drawer.addEventListener("touchend", () => {
  isDragging = false;

  const diff = currentY - startY;

  if (diff > 80) drawer.classList.remove("open");

  drawer.style.transform = "";
});

// ---------------- STYLE ----------------
function style(color) {
  return {
    color,
    weight: 0,
    opacity: 0,
    fillColor: color,
    fillOpacity: 0.7
  };
}

// ---------------- LAYERS ----------------
function addLayer(feature, color, repKey) {
  if (!feature) return;

  L.geoJSON(feature, {
    style: style(color),
    onEachFeature: (f, l) => {
      l.on("click", (e) => {
        L.DomEvent.stopPropagation(e);
        openUI(repKey);
});
    }
  }).addTo(map);
}

// ---------------- BORDERS ----------------
function addStateBorders(states) {
  L.geoJSON(states, {
    style: {
      color: "#2b2b2b",
      weight: 1.1,
      fillOpacity: 0
    },
    interactive: false
  }).addTo(map);
}

// ---------------- HELPERS ----------------
function splitHorizontal(feature, lat) {
  const bbox = turf.bbox(feature);

  const north = turf.bboxPolygon([bbox[0], lat, bbox[2], bbox[3]]);
  const south = turf.bboxPolygon([bbox[0], bbox[1], bbox[2], lat]);

  return {
    north: turf.intersect(feature, north),
    south: turf.intersect(feature, south)
  };
}

function splitVertical(feature, lng) {
  const bbox = turf.bbox(feature);

  const west = turf.bboxPolygon([bbox[0], bbox[1], lng, bbox[3]]);
  const east = turf.bboxPolygon([lng, bbox[1], bbox[2], bbox[3]]);

  return {
    west: turf.intersect(feature, west),
    east: turf.intersect(feature, east)
  };
}

// ---------------- SNAP ----------------
function snap(feature) {
  return turf.truncate(feature, { precision: 5, mutate: false });
}

// ---------------- MI ----------------
const MI_UP_COUNTIES = new Set([
  "gogebic","ontonagon","houghton","keweenaw","baraga",
  "marquette","alger","schoolcraft","luce","chippewa","mackinac",
  "iron","dickinson","delta","menominee"
]);

function buildMichigan(counties) {
  let up = [];
  let lp = [];

  counties.forEach(c => {
    const props = c.properties || {};
    const geoid = String(props.GEO_ID || "");
    if (!geoid.startsWith("0500000US26")) return;

    let name = (props.NAME || "")
      .replace(" County", "")
      .trim()
      .toLowerCase();

    if (MI_UP_COUNTIES.has(name)) up.push(c);
    else lp.push(c);
  });

  if (up.length) addLayer(turf.featureCollection(up), "#845ef7", "WI_UP_MI");
  if (lp.length) addLayer(turf.featureCollection(lp), "#f59f00", "IL_IN_OH_MI");
}

// ---------------- LOAD ----------------
fetch("./data/states.json")
  .then(r => r.json())
  .then(data => {

    const states = data.features;
    const get = name => states.find(s => s.properties.NAME === name);

    const MN = get("Minnesota");
    const SD = get("South Dakota");

    const mnSplit = splitHorizontal(MN, 45.041907);
    const sdSplitTop = splitHorizontal(SD, 44.756391);
    const sdBottomSplit = splitVertical(sdSplitTop.south, -102.239981);

    addLayer(turf.union(get("North Dakota"), mnSplit.north), "#51cf66", "ND_NORTH_MN");
    addLayer(sdSplitTop.north, "#51cf66", "ND_NORTH_MN");

    addLayer(turf.union(get("Nebraska"), get("Iowa")), "#4dabf7", "NE_IA_SOUTH_MN");
    addLayer(mnSplit.south, "#4dabf7", "NE_IA_SOUTH_MN");
    addLayer(sdBottomSplit.east, "#4dabf7", "NE_IA_SOUTH_MN");

    addLayer(sdBottomSplit.west, "#ff6b6b", "SD_MT_ID_WY");

    ["Montana","Idaho","Wyoming","Washington","Oregon"].forEach(s =>
      addLayer(get(s), "#ff6b6b", "SD_MT_ID_WY")
    );

    ["Illinois","Indiana","Ohio"].forEach(s =>
      addLayer(get(s), "#f59f00", "IL_IN_OH_MI")
    );

    addLayer(get("Wisconsin"), "#845ef7", "WI_UP_MI");

    fetch("./data/counties.json")
      .then(r => r.json())
      .then(cdata => buildMichigan(cdata.features));

    const assigned = new Set([
      "Minnesota","South Dakota","North Dakota","Nebraska","Iowa",
      "Montana","Idaho","Wyoming","Washington","Oregon",
      "Illinois","Indiana","Ohio","Wisconsin","Michigan"
    ]);

    states.forEach(s => {
      if (!assigned.has(s.properties.NAME)) {
        addLayer(snap(s), "#adb5bd", "IN_HOUSE");
      }
    });

    addStateBorders(states);

  });

</script>

</body>
</html>
