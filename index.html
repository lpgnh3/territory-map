<!DOCTYPE html>
<html>
<head>
  <title>LPG Territory Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }

    /* ===== Seam Fix ===== */
    .leaflet-overlay-pane svg {
      shape-rendering: geometricPrecision;
    }

    .leaflet-overlay-pane path {
      stroke: none !important;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .leaflet-pane svg {
      transform: translateZ(0);
    }

    /* ===== Popup Base ===== */
    .popup-card {
      display: flex;
      gap: 12px;
      width: 100%;
      font-family: Arial;
      align-items: center;
    }

    .popup-img {
      width: 90px;
      height: 110px;
      object-fit: cover;
      border-radius: 10px;
    }

    .popup-name {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .popup-contact {
      font-size: 12.5px;
      line-height: 1.5;
    }

    .leaflet-popup {
      margin-bottom: 40px;
    }

    /* ===== 🔥 REAL MOBILE FIX ===== */
    .mobile-popup .leaflet-popup-content-wrapper {
      width: 90vw !important;
      max-width: none !important;
      border-radius: 16px;
    }

    .mobile-popup .leaflet-popup-content {
      width: 100% !important;
      max-width: none !important;
      margin: 12px !important;
    }

    @media (max-width: 768px) {

      .popup-card {
        width: 100%;
        gap: 16px;
      }

      .popup-img {
        width: 120px;
        height: 150px;
      }

      .popup-name {
        font-size: 18px;
      }

      .popup-contact {
        font-size: 14px;
      }

    }
  </style>
</head>

<body>
<div id="map"></div>

<script>
const map = L.map('map', {
  preferCanvas: true
}).setView([39, -94], 5);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {
    updateWhenZooming: false,
    keepBuffer: 2
  }
).addTo(map);

// ---------------- REPS ----------------
const reps = {
  NE_IA_SOUTH_MN: { name:"Tristen Durant", email:"tldurant@lpgnh3.com", phone:"(763) 234-8661", photo:"./photos/Tristen.jpg" },
  ND_NORTH_MN: { name:"Darin Adolphson", email:"djadolphsen@lpgnh3.com", phone:"(763) 234-7674", photo:"./photos/Darin.jpg" },
  IL_IN_OH_MI: { name:"Matt Hall", email:"mwhall@lpgnh3.com", phone:"(309) 206-0533", photo:"./photos/Matt.jpg" },
  WI_UP_MI: { name:"Chris Mikula", email:"cmmikula@lpgnh3.com", phone:"(920) 470-0717", photo:"./photos/Chris.jpg" },
  SD_MT_ID_WY: { name:"Norm Steveson", email:"nrsteveson@lpgnh3.com", phone:"800-328-0314", photo:"./photos/Norm.jpg" },
  IN_HOUSE: { name:"LPG & NH3 Supply", email:"sales@lpgnh3.com", phone:"800-328-0314", photo:"./photos/LPG.png" }
};

// ---------------- STYLE ----------------
function style(color) {
  return {
    color: color,
    weight: 0,
    opacity: 0,
    fillColor: color,
    fillOpacity: 0.7
  };
}

// ---------------- POPUP ----------------
function popup(rep) {
  return `
    <div class="popup-card">
      <img src="${rep.photo}" class="popup-img"/>
      <div>
        <div class="popup-name">${rep.name}</div>
        <div class="popup-contact">${rep.email}<br>${rep.phone}</div>
      </div>
    </div>
  `;
}

// ---------------- STATE BORDERS ----------------
function addStateBorders(states) {
  L.geoJSON(states, {
    style: {
      color: "#2b2b2b",
      weight: 1.5,
      fillOpacity: 0
    },
    interactive: false
  }).addTo(map);
}

// ---------------- ADD LAYER (FIXED POPUP) ----------------
function addLayer(feature, color, repKey) {
  if (!feature) return;

  L.geoJSON(feature, {
    style: style(color),
    onEachFeature: (f, l) => {
      l.on("mouseover", () => l.setStyle({ fillOpacity: 0.85 }));
      l.on("mouseout", () => l.setStyle({ fillOpacity: 0.7 }));
      l.on("click", () => {
        L.popup({
          maxWidth: 1000, // 🔥 removes Leaflet constraint
          className: "mobile-popup",
          autoPanPadding: [20, 80]
        })
        .setLatLng(l.getBounds().getCenter())
        .setContent(popup(reps[repKey]))
        .openOn(map);
      });
    }
  }).addTo(map);
}

// ---------------- LOAD ----------------
fetch("./data/states.json")
  .then(r => r.json())
  .then(data => {
    const states = data.features;

    states.forEach(s => {
      addLayer(s, "#adb5bd", "IN_HOUSE");
    });

    addStateBorders(states);
  });
</script>

</body>
</html>
