<!DOCTYPE html>
<html>
<head>
  <title>LPG Territory Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    #map { height: 100vh; width: 100%; }

    .leaflet-overlay-pane svg {
      shape-rendering: geometricPrecision;
    }

    .leaflet-overlay-pane path {
      stroke: none !important;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .leaflet-pane svg {
      transform: translateZ(0);
    }

    @font-face {
      font-family: 'AntonCustom';
      src: url('./data/anton.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
}

    /* POPUP */
    .popup-card {
      display: flex;
      gap: 12px;
      width: 300px;
      font-family: Arial;
      align-items: center;
    }

    .popup-img {
      width: 120px;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }

    .popup-name {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .popup-contact {
      font-size: 12.5px;
      line-height: 1.5;
    }

    /* DESKTOP PANEL */
    #infoPanel {
      position: fixed;
      top: 0;
      right: -420px;
      width: 380px;
      height: 100vh;
      background: white;
      z-index: 9999;
      box-shadow: -2px 0 20px rgba(0,0,0,0.15);
      transition: right 0.25s ease;
      padding: 20px;
      font-family: Arial;
      overflow-y: auto;
    }

    #infoPanel.open { right: 0; }

    /* MOBILE DRAWER */
    #bottomDrawer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 28vh;
      max-height: 240px;

      background: white;
      z-index: 1200;

      border-top-left-radius: 18px;
      border-top-right-radius: 18px;

      box-shadow: 0 -8px 25px rgba(0,0,0,0.2);

      padding: 12px 14px;
      overflow-y: auto;

      transform: translateY(100%);
      transition: transform 0.25s ease;
      font-family: Arial;
    }

    #bottomDrawer.open {
      transform: translateY(0);
    }

    .drawer-handle {
      width: 40px;
      height: 5px;
      background: #ccc;
      border-radius: 10px;
      margin: 6px auto 10px auto;
    }

    .drawer-card {
      display: flex;
      flex-direction: row-reverse;
      gap: 12px;
      align-items: center;
    }

    .drawer-img {
      width: 90px;
      height: 110px;
      object-fit: cover;
      border-radius: 10px;
    }

    .drawer-text {
      flex: 1;
    }

    @media (max-width: 768px) {
      #infoPanel { display: none; }
    }

    @media (min-width: 769px) {
      #bottomDrawer { display: none; }
    }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* =========================
   CLEAN UI SYSTEM (FIXED)
========================= */

.ui-card {
  display: flex;
  gap: 16px;
  align-items: center;
}

/* TEXT */
.ui-name {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
}

.ui-contact {
  font-size: 16px;
  line-height: 1.6;
}

.ui-contact a {
  display: block;
  margin-top: 4px;
  text-decoration: none;
  color: #1c7ed6;
  font-weight: 500;
  font-size: 15px;
}

.ui-contact a:hover {
  text-decoration: underline;
}

/* IMAGE BASE */
.ui-img {
  width: 140px;
  height: 170px;
  object-fit: cover;
  border-radius: 12px;
}

/* =========================
   DESKTOP PANEL
========================= */
#infoPanel {
  padding: 26px;
}

/* slightly larger desktop */
#infoPanel .ui-img {
  width: 160px;
  height: 190px;
}

#infoPanel .ui-name {
  font-size: 24px;
}

#infoPanel .ui-contact {
  font-size: 17px;
}

/* =========================
   MOBILE DRAWER (CENTERED)
========================= */
#bottomDrawer .ui-card {
  align-items: center;
  text-align: left;
}

#bottomDrawer .ui-img {
  width: 120px;
  height: 160px;
  margin-top: 8px;
}

#bottomDrawer .ui-name {
  font-size: 22px;
  margin-top: 12px;
}

#bottomDrawer .ui-contact {
  font-size: 16px;
  margin-top: 6px;
}

.contact-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;

  margin-top: 8px;
  padding: 10px 14px;

  border-radius: 12px;

  background: linear-gradient(135deg, #f8f9fa, #e9ecef);
  border: 1px solid #dee2e6;

  text-decoration: none;
  color: #212529;

  font-family: 'AntonCustom', sans-serif;
  font-weight: 700;
  font-size: 24px;
  font-style: italic;
  letter-spacing: 0.5px;
  text-transform: uppercase;

  box-shadow: 0 2px 6px rgba(0,0,0,0.08);

  transition: all 0.15s ease;
}

.contact-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
  background: linear-gradient(135deg, #ffffff, #f1f3f5);
}
  </style>
</head>

<body>

<div id="map"></div>
<div id="infoPanel"></div>

<div id="bottomDrawer">
  <div class="drawer-handle"></div>
  <div id="drawerContent"></div>
</div>

<script>

const map = L.map('map', {
  preferCanvas: true
}).setView([39, -94], 5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  updateWhenZooming: false,
  keepBuffer: 2
}).addTo(map);

// ---------------- STATE ----------------
let activeTerritory = null;

// ---------------- REPS ----------------
const reps = {
  NE_IA_SOUTH_MN: { name:"Tristen Durant", email:"tldurant@lpgnh3.com", phone:"(763) 234-8661", photo:"./photos/Tristen.jpg" },
  ND_NORTH_MN: { name:"Darin Adolphson", email:"djadolphsen@lpgnh3.com", phone:"(763) 234-7674", photo:"./photos/Darin.jpg" },
  WI_UP_MI: { name:"Chris Mikula", email:"cmmikula@lpgnh3.com", phone:"(920) 470-0717", photo:"./photos/Chris.jpg" },
  SD_MT_ID_WY: { name:"Norm Steveson", email:"nrsteveson@lpgnh3.com", phone:"800-328-0314", photo:"./photos/Norm.jpg" },
  IN_HOUSE: { name:"LPG & NH3 Supply", email:"sales@lpgnh3.com", phone:"800-328-0314", photo:"./photos/LPG.png" }
};

// ---------------- UI ----------------
function render(repKey) {
  const r = reps[repKey];

  return `
    <div class="ui-card">

      <img src="${r.photo}" class="ui-img"/>

      <div style="flex:1;">
        <div class="ui-name">${r.name}</div>

        <div class="ui-contact">
  <a href="mailto:${r.email}" class="contact-btn">Email</a>
  <a href="tel:${r.phone.replace(/[^0-9+]/g, '')}" class="contact-btn">Call</a>
</div>
      </div>

    </div>
  `;
}

function closeUI() {
  document.getElementById("infoPanel").classList.remove("open");
  document.getElementById("bottomDrawer").classList.remove("open");
  activeTerritory = null;
}

function openUI(repKey) {
  const isMobile = window.innerWidth <= 768;

  if (activeTerritory === repKey) {
    closeUI();
    return;
  }

  activeTerritory = repKey;

  const html = render(repKey);

  if (isMobile) {
    document.getElementById("drawerContent").innerHTML = html;
    document.getElementById("bottomDrawer").classList.add("open");
  } else {
    document.getElementById("infoPanel").innerHTML = html;
    document.getElementById("infoPanel").classList.add("open");
  }
}

// ---------------- MAP CLICK CLOSE (SAFE) ----------------
map.on("click", () => closeUI());

// ---------------- STYLE ----------------
function fixSeams(feature) {
  if (!feature) return null;

  try {
    return turf.buffer(feature, 0.01, { units: "degrees" });
  } catch (e) {
    return feature;
  }
}
function style(color) {
  return {
    color: false,
    stroke: false,
    weight: 0,
    fillColor: color,
    fillOpacity: 0.72,
    smoothFactor: 0
  };
}

// ---------------- SAFE UNION ----------------
function safeUnion(a, b) {
  if (!a || !b) return null;
  try {
    return turf.union(a, b);
  } catch (e) {
    console.log("union failed", e);
    return null;
  }
}

// ---------------- LAYERS ----------------
function addLayer(feature, color, repKey) {
  if (!feature) return;

  const fixed = fixSeams(feature); // 👈 THIS LINE FIXES GAPS

  L.geoJSON(fixed, {
    style: style(color),
    onEachFeature: (f, l) => {
      l.on("click", (e) => {
        L.DomEvent.stopPropagation(e);
        openUI(repKey);
l.on("click", (e) => {
        L.DomEvent.stopPropagation(e);
        openUI(repKey);
      });

      // 🔥 HOVER IN
      l.on("mouseover", () => {
        l.setStyle({
          fillOpacity: 0.9
        });
      });

      // 🔥 HOVER OUT
      l.on("mouseout", () => {
        l.setStyle({
          fillOpacity: 0.7
      });
    }
  }).addTo(map);
}

// ---------------- SNAP ----------------
function snap(feature) {
  if (!feature) return null;
  return turf.truncate(feature, { precision: 5, mutate: false });
}

// ---------------- BORDERS ----------------
function addStateBorders(states) {
  L.geoJSON(states, {
    style: {
      color: "#2b2b2b",
      weight: 1.1,
      fillOpacity: 0
    },
    interactive: false
  }).addTo(map);
}

// ---------------- HELPERS ----------------
function splitHorizontal(feature, lat) {
  if (!feature) return { north:null, south:null };

  const bbox = turf.bbox(feature);

  return {
    north: turf.intersect(feature, turf.bboxPolygon([bbox[0], lat, bbox[2], bbox[3]])),
    south: turf.intersect(feature, turf.bboxPolygon([bbox[0], bbox[1], bbox[2], lat]))
  };
}

function splitVertical(feature, lng) {
  if (!feature) return { west:null, east:null };

  const bbox = turf.bbox(feature);

  return {
    west: turf.intersect(feature, turf.bboxPolygon([bbox[0], bbox[1], lng, bbox[3]])),
    east: turf.intersect(feature, turf.bboxPolygon([lng, bbox[1], bbox[2], bbox[3]]))
  };
}

// ---------------- LOAD ----------------
fetch("./data/states.json")
  .then(r => r.json())
  .then(data => {

    const states = data.features;
    const get = n => states.find(s => s.properties.NAME === n);

    const MN = get("Minnesota");
    const SD = get("South Dakota");

    if (!MN || !SD) return;

    const mnSplit = splitHorizontal(MN, 45.041907);
    const sdSplitTop = splitHorizontal(SD, 44.756391);
    const sdBottomSplit = splitVertical(sdSplitTop.south, -102.239981);

    addLayer(safeUnion(get("North Dakota"), mnSplit.north), "#51cf66", "ND_NORTH_MN");
    addLayer(sdSplitTop.north, "#51cf66", "ND_NORTH_MN");

    addLayer(safeUnion(get("Nebraska"), get("Iowa")), "#4dabf7", "NE_IA_SOUTH_MN");
    addLayer(mnSplit.south, "#4dabf7", "NE_IA_SOUTH_MN");
    addLayer(sdBottomSplit.east, "#4dabf7", "NE_IA_SOUTH_MN");

    addLayer(sdBottomSplit.west, "#ff6b6b", "SD_MT_ID_WY");

    ["Montana","Idaho","Wyoming","Washington","Oregon"].forEach(s =>
      addLayer(get(s), "#ff6b6b", "SD_MT_ID_WY")
    );

    ["Illinois","Indiana","Ohio"].forEach(s =>
      addLayer(get(s), "#adb5bd", "IN_HOUSE")
    );

    addLayer(get("Wisconsin"), "#845ef7", "WI_UP_MI");

    fetch("./data/counties.json")
      .then(r => r.json())
      .then(cdata => {
        let up = [], lp = [];

        cdata.features.forEach(c => {
          const props = c.properties || {};
          const geoid = String(props.GEO_ID || "");
          if (!geoid.startsWith("0500000US26")) return;

          let name = (props.NAME || "").replace(" County","").toLowerCase();

          const upSet = new Set([
            "gogebic","ontonagon","houghton","keweenaw","baraga",
            "marquette","alger","schoolcraft","luce","chippewa","mackinac",
            "iron","dickinson","delta","menominee"
          ]);

          if (upSet.has(name)) up.push(c);
          else lp.push(c);
        });

        if (up.length) addLayer(turf.featureCollection(up), "#845ef7", "WI_UP_MI");
        if (lp.length) addLayer(turf.featureCollection(lp), "#adb5bd", "IN_HOUSE");
      });

    const assigned = new Set([
      "Minnesota","South Dakota","North Dakota","Nebraska","Iowa",
      "Montana","Idaho","Wyoming","Washington","Oregon",
      "Illinois","Indiana","Ohio","Wisconsin","Michigan"
    ]);

    states.forEach(s => {
      if (!assigned.has(s.properties.NAME)) {
        addLayer(snap(s), "#adb5bd", "IN_HOUSE");
      }
    });

    addStateBorders(states);

  });

</script>

</body>
</html>
