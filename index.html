<!DOCTYPE html>
<html>
<head>
  <title>LPG Territory Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <style>
    #map { height: 100vh; width: 100%; }

    .leaflet-overlay-pane svg {
      shape-rendering: geometricPrecision;
    }

    .leaflet-overlay-pane path {
      stroke: none !important;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .leaflet-pane svg {
      transform: translateZ(0);
    }

    .popup-card {
      display: flex;
      gap: 12px;
      width: 300px;
      font-family: Arial;
      align-items: center;
    }

    .popup-img {
      width: 120px;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }

    .popup-name {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .popup-contact {
      font-size: 12.5px;
      line-height: 1.5;
    }
  </style>
</head>

<body>
<div id="map"></div>

<script>

const map = L.map('map', {
  preferCanvas: true
}).setView([39, -94], 5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  updateWhenZooming: false,
  keepBuffer: 2
}).addTo(map);

// ---------------- REPS ----------------
const reps = {
  NE_IA_SOUTH_MN: { name:"Tristen Durant", email:"tldurant@lpgnh3.com", phone:"(763) 234-8661", photo:"./photos/Tristen.jpg" },
  ND_NORTH_MN: { name:"Darin Adolphson", email:"djadolphsen@lpgnh3.com", phone:"(763) 234-7674", photo:"./photos/Darin.jpg" },
  IL_IN_OH_MI: { name:"Matt Hall", email:"mwhall@lpgnh3.com", phone:"(309) 206-0533", photo:"./photos/Matt.jpg" },
  WI_UP_MI: { name:"Chris Mikula", email:"cmmikula@lpgnh3.com", phone:"(920) 470-0717", photo:"./photos/Chris.jpg" },
  SD_MT_ID_WY: { name:"Norm Steveson", email:"nrsteveson@lpgnh3.com", phone:"800-328-0314", photo:"./photos/Norm.jpg" },
  IN_HOUSE: { name:"LPG & NH3 Supply", email:"sales@lpgnh3.com", phone:"800-328-0314", photo:"./photos/LPG.png" }
};

// ---------------- STYLE ----------------
function style(color) {
  return {
    color: color,
    weight: 0,
    opacity: 0,
    fillColor: color,
    fillOpacity: 0.7
  };
}

// ---------------- POPUP ----------------
function popup(rep) {
  return `
    <div class="popup-card">
      <img src="${rep.photo}" class="popup-img"/>
      <div>
        <div class="popup-name">${rep.name}</div>
        <div class="popup-contact">${rep.email}<br>${rep.phone}</div>
      </div>
    </div>
  `;
}

// ---------------- STATE BORDERS (NEW FIX) ----------------
function addStateBorders(states) {
  L.geoJSON(states, {
    style: {
      color: "#2b2b2b",
      weight: 1.5,
      fillOpacity: 0
    },
    interactive: false
  }).addTo(map);
}

// ---------------- HELPERS ----------------
function splitHorizontal(feature, lat) {
  const bbox = turf.bbox(feature);

  const north = turf.bboxPolygon([bbox[0], lat, bbox[2], bbox[3]]);
  const south = turf.bboxPolygon([bbox[0], bbox[1], bbox[2], lat]);

  return {
    north: turf.intersect(feature, north),
    south: turf.intersect(feature, south)
  };
}

function splitVertical(feature, lng) {
  const bbox = turf.bbox(feature);

  const west = turf.bboxPolygon([bbox[0], bbox[1], lng, bbox[3]]);
  const east = turf.bboxPolygon([lng, bbox[1], bbox[2], bbox[3]]);

  return {
    west: turf.intersect(feature, west),
    east: turf.intersect(feature, east)
  };
}

// ---------------- ADD LAYER ----------------
function addLayer(feature, color, repKey) {
  if (!feature) return;

  L.geoJSON(feature, {
    style: style(color),
    onEachFeature: (f, l) => {
      l.on("mouseover", () => l.setStyle({ fillOpacity: 0.85 }));
      l.on("mouseout", () => l.setStyle({ fillOpacity: 0.7 }));
      l.on("click", () => {
        L.popup()
          .setLatLng(l.getBounds().getCenter())
          .setContent(popup(reps[repKey]))
          .openOn(map);
      });
    }
  }).addTo(map);
}

// ---------------- SNAP ----------------
function snap(feature) {
  return turf.truncate(feature, {
    precision: 5,
    mutate: false
  });
}

// ---------------- MI ----------------
const MI_UP_COUNTIES = new Set([
  "gogebic","ontonagon","houghton","keweenaw","baraga",
  "marquette","alger","schoolcraft","luce","chippewa","mackinac",
  "iron","dickinson","delta","menominee"
]);

function buildMichigan(counties) {

  let up = [];
  let lp = [];

  counties.forEach(c => {

    const props = c.properties || {};

    const geoid = String(props.GEO_ID || "");
    if (!geoid.startsWith("0500000US26")) return;

    let name = (props.NAME || "")
      .replace(" County", "")
      .trim()
      .toLowerCase();

    if (MI_UP_COUNTIES.has(name)) up.push(c);
    else lp.push(c);
  });

  if (up.length) {
    addLayer(turf.featureCollection(up), "#845ef7", "WI_UP_MI");
  }

  if (lp.length) {
    addLayer(turf.featureCollection(lp), "#f59f00", "IL_IN_OH_MI");
  }
}

// ---------------- MAIN LOAD ----------------
fetch("./data/states.json")
  .then(r => r.json())
  .then(data => {

    const states = data.features;
    const get = name => states.find(s => s.properties.NAME === name);

    const MN = get("Minnesota");
    const SD = get("South Dakota");

    const mnSplit = splitHorizontal(MN, 45.041907);

    const sdSplitTop = splitHorizontal(SD, 44.756391);
    const sdBottomSplit = splitVertical(sdSplitTop.south, -102.239981);

    const sdNorth = sdSplitTop.north;
    const sdSouthEast = sdBottomSplit.east;
    const sdSouthWest = sdBottomSplit.west;

    // TERRITORIES
    addLayer(turf.union(get("North Dakota"), mnSplit.north), "#51cf66", "ND_NORTH_MN");
    addLayer(sdNorth, "#51cf66", "ND_NORTH_MN");

    addLayer(turf.union(get("Nebraska"), get("Iowa")), "#4dabf7", "NE_IA_SOUTH_MN");
    addLayer(mnSplit.south, "#4dabf7", "NE_IA_SOUTH_MN");
    addLayer(sdSouthEast, "#4dabf7", "NE_IA_SOUTH_MN");

    addLayer(sdSouthWest, "#ff6b6b", "SD_MT_ID_WY");

    ["Montana","Idaho","Wyoming","Washington","Oregon"].forEach(s =>
      addLayer(get(s), "#ff6b6b", "SD_MT_ID_WY")
    );

    ["Illinois","Indiana","Ohio"].forEach(s =>
      addLayer(get(s), "#f59f00", "IL_IN_OH_MI")
    );

    addLayer(get("Wisconsin"), "#845ef7", "WI_UP_MI");

    fetch("./data/counties.json")
      .then(r => r.json())
      .then(cdata => buildMichigan(cdata.features));

    const assigned = new Set([
      "Minnesota","South Dakota","North Dakota","Nebraska","Iowa",
      "Montana","Idaho","Wyoming","Washington","Oregon",
      "Illinois","Indiana","Ohio","Wisconsin","Michigan"
    ]);

    states.forEach(s => {
      if (!assigned.has(s.properties.NAME)) {
        addLayer(snap(s), "#adb5bd", "IN_HOUSE");
      }
    });

    // ✅ FINAL STEP: draw borders ON TOP of everything
    addStateBorders(states);

  });

</script>

</body>
</html>
