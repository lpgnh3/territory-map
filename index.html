<!DOCTYPE html>
<html>
<head>
  <title>LPG Territory Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }

    /* =========================
       MAP CLEANUP
    ========================= */
    .leaflet-overlay-pane svg {
      shape-rendering: geometricPrecision;
    }

    .leaflet-overlay-pane path {
      stroke: none !important;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .leaflet-pane svg {
      transform: translateZ(0);
    }

    /* =========================
       SIDE PANEL (DESKTOP)
    ========================= */
    #infoPanel {
      position: fixed;
      top: 0;
      right: -420px;
      width: 380px;
      height: 100vh;
      background: white;
      z-index: 9999;
      box-shadow: -2px 0 20px rgba(0,0,0,0.15);
      transition: right 0.25s ease;
      padding: 20px;
      font-family: Arial;
      overflow-y: auto;
    }

    #infoPanel.open {
      right: 0;
    }

    #infoClose {
      cursor: pointer;
      font-size: 18px;
      margin-bottom: 10px;
      display: inline-block;
    }

    .panel-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .panel-name {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .panel-contact {
      font-size: 14px;
      line-height: 1.6;
    }

    /* =========================
       MOBILE BOTTOM DRAWER
    ========================= */
    .bottom-drawer {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;

  height: 40vh;          /* 👈 key change (controls “too tall”) */
  max-height: 320px;     /* 👈 prevents giant iPhone expansion */

  background: white;
  border-top-left-radius: 18px;
  border-top-right-radius: 18px;

  z-index: 1000;

  padding: 12px 14px;
  box-shadow: 0 -8px 30px rgba(0,0,0,0.2);

  overflow-y: auto;
}

    #bottomDrawer.open {
      bottom: 0;
    }

    .drawer-handle {
  width: 40px;
  height: 5px;
  background: #ccc;
  border-radius: 10px;
  margin: 0 auto 10px auto;
}

    /* =========================
       RESPONSIVE SWITCH
    ========================= */
    @media (max-width: 768px) {
      #infoPanel {
        display: none;
      }
    }

    @media (min-width: 769px) {
      #bottomDrawer {
        display: none;
      }
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- DESKTOP PANEL -->
<div id="infoPanel">
  <span id="infoClose">✕ Close</span>
  <div id="panelContent"></div>
</div>

<!-- MOBILE DRAWER -->
<div id="bottomDrawer">
  <div id="drawerHandle"></div>
  <div id="drawerContent"></div>
</div>

<script>

const map = L.map('map', { preferCanvas: true }).setView([39, -94], 5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  updateWhenZooming: false,
  keepBuffer: 2
}).addTo(map);

// ---------------- REPS ----------------
const reps = {
  NE_IA_SOUTH_MN: { name:"Tristen Durant", email:"tldurant@lpgnh3.com", phone:"(763) 234-8661", photo:"./photos/Tristen.jpg" },
  ND_NORTH_MN: { name:"Darin Adolphson", email:"djadolphsen@lpgnh3.com", phone:"(763) 234-7674", photo:"./photos/Darin.jpg" },
  IL_IN_OH_MI: { name:"Matt Hall", email:"mwhall@lpgnh3.com", phone:"(309) 206-0533", photo:"./photos/Matt.jpg" },
  WI_UP_MI: { name:"Chris Mikula", email:"cmmikula@lpgnh3.com", phone:"(920) 470-0717", photo:"./photos/Chris.jpg" },
  SD_MT_ID_WY: { name:"Norm Steveson", email:"nrsteveson@lpgnh3.com", phone:"800-328-0314", photo:"./photos/Norm.jpg" },
  IN_HOUSE: { name:"LPG & NH3 Supply", email:"sales@lpgnh3.com", phone:"800-328-0314", photo:"./photos/LPG.png" }
};

// ---------------- PANEL RENDER ----------------
function render(repKey) {
  const rep = reps[repKey];

  return `
    <img src="${rep.photo}" class="panel-img"/>
    <div class="panel-name">${rep.name}</div>
    <div class="panel-contact">
      ${rep.email}<br/>
      ${rep.phone}
    </div>
  `;
}

// ---------------- UI CONTROL ----------------
function openPanel(repKey) {
  const isMobile = window.matchMedia("(max-width: 768px)").matches;

  if (isMobile) {
    document.getElementById("drawerContent").innerHTML = render(repKey);
    document.getElementById("bottomDrawer").classList.add("open");
  } else {
    document.getElementById("panelContent").innerHTML = render(repKey);
    document.getElementById("infoPanel").classList.add("open");
  }
}

document.getElementById("infoClose").onclick = () => {
  document.getElementById("infoPanel").classList.remove("open");
};

document.getElementById("bottomDrawer").onclick = () => {
  document.getElementById("bottomDrawer").classList.remove("open");
};

// ---------------- STYLE ----------------
function style(color) {
  return {
    color: color,
    weight: 0,
    opacity: 0,
    fillColor: color,
    fillOpacity: 0.7
  };
}

// ---------------- ADD LAYER ----------------
function addLayer(feature, color, repKey) {
  if (!feature) return;

  L.geoJSON(feature, {
    style: style(color),
    onEachFeature: (f, l) => {
      l.on("click", () => {
        openPanel(repKey);
      });
    }
  }).addTo(map);
}

// ---------------- SNAP ----------------
function snap(feature) {
  return turf.truncate(feature, {
    precision: 5,
    mutate: false
  });
}

// ---------------- LOAD (your logic untouched) ----------------
fetch("./data/states.json")
  .then(r => r.json())
  .then(data => {

    const states = data.features;

    states.forEach(s => {
      addLayer(snap(s), "#adb5bd", "IN_HOUSE");
    });

  });

</script>

</body>
</html>
